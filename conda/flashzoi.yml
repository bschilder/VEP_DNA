name: flashzoi
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.10,<3.13
  - pooch 
  - pandas
  - tqdm 
  ## Necessary for Elzar HPC
  - gcc
  - libgcc
  - libstdcxx-ng
  - rust 
  ## Optional
  - bioconda::pgenlib # Optional
  - xarray # Optional
  - zarr # Optional
  - dask # Optional
  - pip
  - pip:
      - genvarloader
      # - git+https://github.com/mcvickerlab/GenVarLoader.git # Optional
      - borzoi-pytorch
      - flash-attn==2.6.3 # Avoids build issues: python -m pip install flash-attn==2.6.3 --no-build-isolation
      - ipykernel